<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>사례 점검 회의 서식 — 최종 (2단)</title>
<style>
  /* ============================================================
     v6 — 카드 기반 클린 디자인 (발표 가시성 우선)
     변경 핵심:
     · 그리드 라인 흉내 제거 → 부드러운 카드 분리
     · 모든 라벨 너비 통일 (--label-width: 120px)
     · 라벨은 한 줄 고정 (white-space: nowrap)
     · 진단/환자정보/보고정보 등 짧은 항목은 inline-pairs로 압축
     · 직업력/유해인자 등 긴 텍스트는 큰 영역으로 명확히 강조
     · 수정 가능(유해인자)·판정 입력은 노란 강조로 시각적 차별
  ============================================================ */
  :root {
    --c-page: #f3f4f6;
    --c-card: #ffffff;
    --c-border: #e5e7eb;
    --c-divider: #f3f4f6;
    --c-text: #111827;
    --c-text-muted: #6b7280;
    --c-label: #4b5563;
    --c-accent: #2563eb;
    --c-warn: #b45309;
    --c-edit-bg: #fffbeb;
    --c-edit-border: #f59e0b;
    --c-edit-bar: #fef3c7;
    --c-disabled: #d1d5db;
    --font-base: 17px;
    --label-width: 120px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--c-page);
    color: var(--c-text);
    font-family: "Pretendard", "Malgun Gothic", "맑은 고딕", system-ui, -apple-system, sans-serif;
    font-size: var(--font-base);
    line-height: 1.5;
  }
  code, .mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; }

  .page {
    max-width: 1180px;
    margin: 24px auto;
    padding: 0 16px;
  }

  /* MODIFIED: 2단 레이아웃 (실험용) */
  .page.two-col { max-width: 1600px; }
  .two-column-layout {
    display: grid;
    grid-template-columns: 3fr 7fr;
    gap: 12px;
    align-items: start;
  }
  .two-column-layout > .col {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }
  .two-column-layout > .col > section.card,
  .two-column-layout > .col > section.hero {
    margin-bottom: 0;
  }
  @media (max-width: 1100px) {
    .two-column-layout { grid-template-columns: 1fr; }
  }

  /* ───── 도구막대 ───── */
  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 12px 18px;
    background: var(--c-card);
    border-radius: 12px;
    margin-bottom: 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .toolbar .grow { flex: 1; }
  .toolbar button {
    font: inherit;
    padding: 6px 14px;
    border: 1px solid var(--c-border);
    background: #fff;
    cursor: pointer;
    border-radius: 6px;
  }
  .toolbar button:disabled {
    background: #f3f4f6;
    color: #9ca3af;
    cursor: not-allowed;
    border-color: var(--c-border);
  }
  .toolbar input[type="number"] {
    font: inherit;
    width: 80px;
    padding: 5px 10px;
    border: 1px solid var(--c-border);
    border-radius: 6px;
  }
  .toolbar .font-ctl {
    display: flex;
    gap: 4px;
    align-items: center;
    color: var(--c-text-muted);
  }
  .toolbar .font-ctl .level {
    font-size: 0.85em;
    min-width: 30px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* ───── 사례 헤더(맨 위) ───── */
  .hero {
    display: flex;
    align-items: baseline;
    gap: 18px;
    padding: 20px 24px;
    background: var(--c-card);
    border-radius: 12px;
    margin-bottom: 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .hero .num {
    font-size: 1.75em;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .hero .num small {
    font-size: 0.55em;
    font-weight: 600;
    color: var(--c-text-muted);
    margin-right: 6px;
  }
  .hero .index {
    font-size: 0.95em;
    color: var(--c-text);
    background: #eef2ff;
    color: #3730a3;
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .hero .index small {
    color: #6366f1;
    font-weight: 500;
    margin-right: 6px;
  }
  .hero .spacer { flex: 1; }
  .hero .status {
    font-size: 0.85em;
    background: #fef3c7;
    color: #92400e;
    padding: 4px 12px;
    border-radius: 999px;
    font-weight: 600;
  }

  /* ───── 카드 (섹션) ───── */
  section.card {
    background: var(--c-card);
    border-radius: 12px;
    padding: 18px 24px;
    margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  section.card > h2 {
    font-size: 0.95em;
    font-weight: 700;
    color: var(--c-text-muted);
    margin: 0 0 14px 0;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--c-divider);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  section.card > h2 .h2-search {
    margin-left: auto;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  section.card > h2 .badge {
    font-size: 0.85em;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 999px;
  }
  section.card > h2 .badge.edit {
    background: var(--c-edit-bar);
    color: #92400e;
  }

  /* ───── 라벨/값 그리드 (일관된 라벨 너비) ───── */
  .kv-list { display: grid; gap: 12px; }
  .kv {
    display: grid;
    grid-template-columns: var(--label-width) 1fr;
    align-items: baseline;
    gap: 16px;
    min-height: 30px;
  }
  /* MODIFIED: label 영역 시각 구분 (배경 #f9fafb 재사용) */
  .kv > label {
    font-weight: 700;
    color: var(--c-label);
    font-size: 0.95em;
    white-space: nowrap;
    padding: 4px 10px;
    background: #f3f4f6;
    border-radius: 4px;
  }
  .kv > .v {
    color: var(--c-text);
    font-size: 1em;
    line-height: 1.55;
    word-break: keep-all;
  }
  .kv > .v.muted { color: var(--c-text-muted); font-style: italic; }
  .kv > .v.code { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-weight: 600; }
  .kv.stack { align-items: start; }
  .kv.stack .v-block { display: flex; flex-direction: column; gap: 8px; }

  /* ───── 인라인 페어 (한 줄에 여러 라벨:값) ───── */
  .inline-pairs {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 28px;
    align-items: baseline;
  }
  .inline-pairs > .pair {
    display: inline-flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  /* MODIFIED: inline label 영역 시각 구분 (배경 #f9fafb 재사용) */
  .inline-pairs .k {
    font-weight: 700;
    color: var(--c-label);
    font-size: 0.92em;
    white-space: nowrap;
    padding: 3px 9px;
    background: #f3f4f6;
    border-radius: 4px;
  }
  .inline-pairs .v { color: var(--c-text); }
  .inline-pairs .v.code { font-family: ui-monospace, Consolas, monospace; font-weight: 600; }
  .inline-pairs .v.muted { color: var(--c-text-muted); font-style: italic; }

  /* ───── 검색·유사사례 (헤더 옆 또는 인라인) ───── */
  input.search {
    font: inherit;
    font-size: 0.88em;
    padding: 5px 10px;
    width: 160px;
    border: 1px solid var(--c-border);
    border-radius: 6px;
    background: #fff;
  }
  button.similar {
    font: inherit;
    font-size: 0.85em;
    padding: 5px 12px;
    background: #fff;
    color: var(--c-accent);
    border: 1px solid var(--c-accent);
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    white-space: nowrap;
  }
  button.similar:hover { background: var(--c-accent); color: #fff; }

  .search-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* ───── 큰 텍스트 영역 (직업력/유해인자) ───── */
  .big-text {
    font-size: 1.02em;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: keep-all;
    margin: 0;
    padding: 14px 18px;
    background: #f9fafb;
    border-radius: 8px;
    border-left: 3px solid #d1d5db;
    color: var(--c-text);
  }
  .big-text:empty::before {
    content: "(미기재)";
    color: var(--c-text-muted);
    font-style: italic;
  }

  /* ───── 수정 가능 (유해인자) ───── */
  section.card.editable { background: linear-gradient(180deg, var(--c-edit-bg), #fff 60%); }
  textarea.autogrow {
    width: 100%;
    min-height: 56px;
    padding: 14px 18px;
    font: inherit;
    font-size: 1.02em;
    line-height: 1.75;
    border: 1px solid var(--c-edit-border);
    border-radius: 8px;
    background: #fff;
    white-space: pre-wrap;
    resize: vertical;
    overflow: hidden;
  }
  textarea.autogrow:focus {
    outline: 2px solid var(--c-accent);
    outline-offset: -1px;
    border-color: var(--c-accent);
  }

  /* ───── 판정 입력 (질환/업무관련성/유해인자분류) ───── */
  section.card.judgment { border-left: 4px solid var(--c-edit-border); }
  .judgment-list { display: grid; gap: 14px; }
  .judgment-row {
    display: grid;
    grid-template-columns: var(--label-width) 1fr 220px;
    gap: 14px;
    align-items: center;
    padding: 4px 0;
  }
  /* MODIFIED: 판정 입력 label 영역 시각 구분 (배경 #f9fafb 재사용) */
  .judgment-row > label {
    font-weight: 700;
    color: var(--c-label);
    font-size: 0.95em;
    white-space: nowrap;
    padding: 6px 10px;
    background: #f3f4f6;
    border-radius: 4px;
  }
  .judgment-row select {
    font: inherit;
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--c-edit-border);
    border-radius: 6px;
    background: var(--c-edit-bg);
    color: var(--c-text);
  }
  .judgment-row select:focus {
    outline: 2px solid var(--c-accent);
    outline-offset: -1px;
  }
  .judgment-row .existing {
    font-size: 0.92em;
    color: var(--c-text-muted);
    padding: 8px 12px;
    background: #f9fafb;
    border-radius: 6px;
    border-left: 3px solid #fbbf24;
  }
  .judgment-row .existing.empty {
    color: #9ca3af;
    font-style: italic;
    border-left-color: var(--c-divider);
    background: transparent;
  }
  .judgment-row .existing .pill {
    font-size: 0.78em;
    background: var(--c-edit-bar);
    color: #92400e;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
    margin-right: 8px;
  }

  /* ───── 액션 영역 ───── */
  .actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 18px;
    padding-bottom: 24px;
  }
  .actions button {
    font: inherit;
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.98em;
  }
  .actions .save {
    background: var(--c-accent);
    color: #fff;
    border: 1px solid var(--c-accent);
  }
  .actions .save:hover { background: #1d4ed8; }
  .actions .reset {
    background: #fff;
    color: var(--c-text);
    border: 1px solid var(--c-border);
  }

  /* 좁은 화면 대응 */
  @media (max-width: 720px) {
    :root { --label-width: 95px; }
    .judgment-row { grid-template-columns: var(--label-width) 1fr; }
    .judgment-row .existing { grid-column: 1 / -1; }
  }

  @media print {
    .toolbar, .actions, button.similar, input.search, .h2-search { display: none; }
    section.card.editable { background: #fff; }
  }
</style>
</head>
<body>
<div class="page two-col">

  <!-- ========================= 도구막대 ========================= -->
  <header class="toolbar">
    <strong>사례 조회</strong>
    <span style="color: var(--c-text-muted)">연번</span>
    <input type="number" id="caseNo" value="1">
    <button id="btnLookup">조회</button>
    <button>← 이전</button>
    <button>다음 →</button>
    <span class="grow"></span>
    <span class="font-ctl">
      글씨
      <button id="fontMinus" onclick="adjustFont(-1)">−</button>
      <span class="level" id="fontLevel">1/4</span>
      <button id="fontPlus" onclick="adjustFont(+1)">＋</button>
    </span>
  </header>

  <!-- ========================= 사례 헤더 + 환자 (MODIFIED: 2단 위 full-width 이동) ========================= -->
  <section class="hero">
    <span class="num"><small>연번</small><span data-display="caseno">1</span></span>
    <span class="index"><small>색인</small><span data-display="index">—</span></span>
    <span class="status">데모</span>
    <span class="spacer"></span>
    <div class="inline-pairs">
      <span class="pair"><span class="k">성별</span><span class="v" data-display="gender">—</span></span>
      <span class="pair"><span class="k">연령대</span><span class="v" data-display="age">—</span></span>
      <span class="pair"><span class="k">이름</span><span class="v muted" data-display="name">—</span></span>
    </div>
  </section>

  <!-- MODIFIED: 2단 레이아웃 wrapper 시작 -->
  <div class="two-column-layout">
  <div class="col col-left">

  <!-- ========================= 직업·산업 ========================= -->
  <!-- MODIFIED -->
  <section class="card">
    <h2>직업 · 산업</h2>
    <!-- MODIFIED -->
    <div class="inline-pairs">
      <!-- MODIFIED -->
      <span class="pair">
        <span class="k">산업분류</span>
        <span class="v" data-display="ksic">—</span>
      </span>
      <!-- MODIFIED -->
      <span class="pair">
        <span class="k">직업코드</span>
        <span class="v code" data-display="ksco_code">—</span>
      </span>
      <!-- MODIFIED -->
      <span class="pair">
        <span class="k">직업분류</span>
        <span class="v" data-display="ksco">—</span>
        <input type="search" class="search" placeholder="직업분류 키워드 검색">
        <button class="similar" data-field="대상자직업&#10;(한국직업분류표)(KSCO)_제7차">유사사례</button>
      </span>
    </div>
  </section>

  <!-- ========================= 진단 (MODIFIED: 좌측 컬럼으로 이동) ========================= -->
  <section class="card">
    <h2>진단</h2>
    <div class="inline-pairs" style="flex-wrap: nowrap; overflow-x: auto;">
      <span class="pair"><span class="k">진단코드</span><span class="v code" data-display="diagcode">—</span></span>
      <span class="pair"><span class="k">확진여부</span><span class="v" data-display="diagconfirm">—</span></span>
      <span class="pair">
        <span class="k">진단명</span>
        <span class="v" data-display="diagname">—</span>
        <input type="search" class="search" placeholder="진단명 키워드 검색">
        <button class="similar" data-field="최종진단명(의증)">유사사례</button>
      </span>
    </div>
  </section>

  <!-- ========================= 유해인자 (MODIFIED: 좌측 컬럼으로 이동) ========================= -->
  <section class="card editable">
    <h2>
      유해인자
      <span class="badge edit">수정 가능</span>
      <span class="h2-search">
        <input type="search" class="search" placeholder="키워드 검색">
        <button class="similar" data-field="유해인자">유사사례</button>
      </span>
    </h2>
    <textarea
      class="autogrow"
      data-field="유해인자"
      placeholder="유해인자를 입력하세요…"></textarea>
  </section>

  </div><!-- /col-left -->
  <div class="col col-right">

  <!-- ========================= 보고 정보 (MODIFIED: 우측 컬럼 상단으로 이동) ========================= -->
  <section class="card">
    <h2>보고 정보</h2>
    <div class="inline-pairs">
      <span class="pair"><span class="k">보고유형</span><span class="v" data-display="reporttype">—</span></span>
      <span class="pair"><span class="k">보고일</span><span class="v" data-display="reportdate">—</span></span>
      <span class="pair"><span class="k">보고병원</span><span class="v" data-display="hospital">—</span></span>
      <span class="pair">
        <span class="k">보고자</span>
        <span class="v" data-display="reporter">—</span>
        <input type="search" class="search" placeholder="보고자 키워드">
        <button class="similar" data-field="보고인">유사사례</button>
      </span>
    </div>
  </section>

  <!-- ========================= 직업력 및 병력 ========================= -->
  <section class="card">
    <h2>
      직업력 및 병력
      <span class="h2-search">
        <input type="search" class="search" placeholder="키워드 검색">
        <button class="similar" data-field="직업력 및 병력">유사사례</button>
      </span>
    </h2>
    <p class="big-text" data-display="career">—</p>
  </section>

  <!-- ========================= 판정 입력 ========================= -->
  <section class="card judgment">
    <h2>판정 입력 <span class="badge edit">사례 회의 결과 입력</span></h2>
    <div class="judgment-list">

      <div class="judgment-row">
        <label>질환 및 발생형태</label>
        <select data-field="질환 및 발생형태">
          <option value="" selected>— 선택 —</option>
          <option>뇌혈관 질병 또는 심장 질병</option>
          <option>근골격계 질병</option>
          <option>호흡기계 질병</option>
          <option>신경계 질병</option>
          <option>정신 질병</option>
          <option>혈액 및 조혈기계 질병</option>
          <option>피부질병</option>
          <option>눈 또는 귀 질병</option>
          <option>간 질병</option>
          <option>감염성 질병</option>
          <option>직업성 암</option>
          <option>급성중독 등 화학적 요인에 의한 질병</option>
          <option>물리적 요인에 의한 질병</option>
          <option>기타 질병</option>
        </select>
        <div class="existing" data-existing=""><span class="pill">기존값</span><span class="existing-value"></span></div>
      </div>

      <div class="judgment-row">
        <label>업무관련성</label>
        <select data-field="업무관련성">
          <option value="" selected>— 선택 —</option>
          <option>확실(Definite)</option>
          <option>가능성 높음(Probable)</option>
          <option>가능성 있음(Possible)</option>
          <option>가능성 낮음(Unlikely)</option>
          <option>조사분석팀 확인 필요사항</option>
        </select>
        <div class="existing" data-existing=""><span class="pill">기존값</span><span class="existing-value"></span></div>
      </div>

      <div class="judgment-row">
        <label>유해인자분류</label>
        <select data-field="유해인자분류">
          <option value="" selected>— 선택 —</option>
          <option>유기화합물</option>
          <option>금속류</option>
          <option>산 및 알카리류</option>
          <option>가스 상태 물질류</option>
          <option>분진, 흄 (금속 외)</option>
          <option>물리적 인자</option>
          <option>근골격계 부담요인</option>
          <option>생물학적 요인</option>
          <option>사회심리적 요인</option>
          <option>기타</option>
          <option>미상</option>
        </select>
        <div class="existing" data-existing=""><span class="pill">기존값</span><span class="existing-value"></span></div>
      </div>

    </div>
  </section>

  </div><!-- /col-right -->
  </div><!-- /two-column-layout -->

  <!-- ========================= 액션 ========================= -->
  <div class="actions">
    <button class="reset">입력 초기화</button>
    <button class="save">사례 점검 입력 저장</button>
  </div>

</div>

<script>
  // ===== 폰트 크기 4단계 =====
  const FONT_LEVELS = [17, 19, 21, 23];
  let fontIdx = 0;
  function adjustFont(d) {
    fontIdx = Math.max(0, Math.min(FONT_LEVELS.length - 1, fontIdx + d));
    const scope = document.querySelector('[data-display="career"]')?.closest("section");
    if (scope) scope.style.fontSize = FONT_LEVELS[fontIdx] + "px";
    document.getElementById("fontLevel").textContent = (fontIdx + 1) + "/" + FONT_LEVELS.length;
    document.getElementById("fontMinus").disabled = (fontIdx === 0);
    document.getElementById("fontPlus").disabled  = (fontIdx === FONT_LEVELS.length - 1);
  }
  adjustFont(0);

  // ===== 기존값 비어있을 때 영역 흐리게 + 안내 =====
  document.querySelectorAll(".existing").forEach(el => {
    const v = (el.dataset.existing || "").trim();
    if (!v) {
      el.classList.add("empty");
      el.innerHTML = "기존 입력값 없음";
    } else {
      el.querySelector(".existing-value").textContent = v;
    }
  });

  // ===== textarea 자동 높이 =====
  function autoGrow(ta) {
    ta.style.height = "auto";
    ta.style.height = (ta.scrollHeight + 2) + "px";
  }
  document.querySelectorAll("textarea.autogrow").forEach(ta => {
    autoGrow(ta);
    ta.addEventListener("input", () => autoGrow(ta));
  });

  // ===== 유사사례 → GET /search =====
  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }
  function fmtDate(v) {
    if (typeof v === "string" && v.includes("T")) return v.slice(0, 10);
    return v == null ? "" : String(v);
  }
  function fmtNo(v) {
    if (typeof v === "number" && Number.isInteger(v)) return String(v);
    if (typeof v === "number") return String(Math.floor(v));
    return v == null ? "" : String(v);
  }
  function getSearchKeyword(btn) {
    const parent = btn.parentElement;
    const input = parent && parent.querySelector("input.search");
    if (input && input.value.trim()) return input.value.trim();
    const pair = btn.closest(".pair");
    if (pair) {
      const v = pair.querySelector(".v");
      const txt = v ? v.textContent.trim() : "";
      if (txt && txt !== "—") return txt;
    }
    return "";
  }
  function buildSearchModal(results, field, keyword) {
    document.getElementById("__similarModal")?.remove();
    const overlay = document.createElement("div");
    overlay.id = "__similarModal";
    Object.assign(overlay.style, {
      position: "fixed", inset: "0", background: "rgba(0,0,0,0.4)",
      display: "flex", alignItems: "center", justifyContent: "center", zIndex: "9999",
    });
    const panel = document.createElement("div");
    Object.assign(panel.style, {
      background: "#fff", borderRadius: "10px",
      width: "min(1100px, 92vw)", maxHeight: "85vh", overflow: "auto",
      boxShadow: "0 12px 40px rgba(0,0,0,0.25)", padding: "16px 20px",
    });
    const head = document.createElement("div");
    head.style.cssText = "display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e5e7eb;";
    head.innerHTML = `<strong style="font-size:1.05em">유사사례 검색 결과</strong>
      <span style="color:#6b7280;font-size:0.9em">${escapeHtml(field)} · "${escapeHtml(keyword)}" · ${results.length}건</span>
      <span style="flex:1"></span>
      <button type="button" id="__similarClose" style="font:inherit;border:1px solid #e5e7eb;background:#fff;border-radius:6px;padding:4px 12px;cursor:pointer">닫기</button>`;
    panel.appendChild(head);
    if (!results.length) {
      const empty = document.createElement("div");
      empty.style.cssText = "padding:20px;color:#6b7280;text-align:center";
      empty.textContent = "결과 없음";
      panel.appendChild(empty);
    } else {
      const list = document.createElement("div");
      list.style.cssText = "display:flex;flex-direction:column;gap:6px";
      results.forEach(r => {
        const row = document.createElement("button");
        row.type = "button";
        row.style.cssText = "text-align:left;font:inherit;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px 14px;cursor:pointer";
        const _ksco = r["대상자직업\n(한국직업분류표)(KSCO)_제7차"] ?? "";
        const _diag = r["최종진단명(의증)"] ?? "";
        const _hazard = r["유해인자"] ?? "";
        const _reporter = r["보고인"] ?? "";
        const _jparts = [];
        if (r["질환 및 발생형태"]) _jparts.push(`질환=${r["질환 및 발생형태"]}`);
        if (r["업무관련성"])       _jparts.push(`업무관련성=${r["업무관련성"]}`);
        if (r["유해인자분류"])     _jparts.push(`분류=${r["유해인자분류"]}`);
        const _judgment = _jparts.join(" · ");
        row.innerHTML = `
          <div style="display:grid;grid-template-columns:96px 1fr;gap:4px 12px;font-size:0.93em">
            <span style="color:#6b7280">직업분류</span><span>${escapeHtml(_ksco)}</span>
            <span style="color:#6b7280">진단명</span><span>${escapeHtml(_diag)}</span>
            <span style="color:#6b7280">유해인자</span><span>${escapeHtml(_hazard)}</span>
            <span style="color:#6b7280">보고자</span><span>${escapeHtml(_reporter)}</span>
            <span style="color:#6b7280">판정기존값</span><span>${escapeHtml(_judgment)}</span>
          </div>`;
        row.addEventListener("mouseenter", () => row.style.background = "#eef2ff");
        row.addEventListener("mouseleave", () => row.style.background = "#f9fafb");
        row.addEventListener("click", () => {
          const no = fmtNo(r["연번"]);
          if (no) {
            document.getElementById("caseNo").value = no;
            lookupCase();
          }
          overlay.remove();
        });
        list.appendChild(row);
      });
      panel.appendChild(list);
    }
    overlay.appendChild(panel);
    overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
    document.getElementById("__similarClose").addEventListener("click", () => overlay.remove());
    document.addEventListener("keydown", function onEsc(e) {
      if (e.key === "Escape") { overlay.remove(); document.removeEventListener("keydown", onEsc); }
    });
  }
  document.querySelectorAll("button.similar").forEach(btn => {
    btn.addEventListener("click", async () => {
      const field = btn.dataset.field;
      const keyword = getSearchKeyword(btn);
      console.log("[similar] click", { field, keyword });
      if (!keyword) { alert("검색 키워드가 비어있음"); return; }
      const url = `${API_BASE}/search?field=${encodeURIComponent(field)}&keyword=${encodeURIComponent(keyword)}&limit=20`;
      let data;
      try {
        const r = await fetch(url);
        if (!r.ok) { alert(`검색 실패 (${r.status})`); return; }
        data = await r.json();
      } catch (e) { alert(`검색 호출 실패: ${e.message}`); return; }
      console.log("search result", { field, keyword, count: data.length, data });
      buildSearchModal(data, field, keyword);
    });
  });

  // ===== 저장 → POST /review =====
  const REVIEW_ALLOWED = ["질환 및 발생형태", "업무관련성", "유해인자분류", "유해인자"];
  document.querySelector(".actions .save").addEventListener("click", async () => {
    console.log("[save] click");
    const no = document.getElementById("caseNo").value.trim();
    if (!no) { alert("연번이 비어있음"); return; }

    const updates = {};
    document.querySelectorAll("select[data-field], textarea[data-field]").forEach(el => {
      if (!REVIEW_ALLOWED.includes(el.dataset.field)) return;
      const v = el.value;
      if (v) updates[el.dataset.field] = v;
    });
    console.log("[save] payload", { 연번: no, updates });
    if (Object.keys(updates).length === 0) { alert("저장할 판정 입력값이 없음"); return; }

    try {
      console.log("[save] POST", `${API_BASE}/review`);
      const r = await fetch(`${API_BASE}/review`, {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=utf-8" },
        body: JSON.stringify({ 연번: no, updates }),
      });
      console.log("[save] status", r.status);
      const body = await r.json().catch(() => null);
      console.log("[save] body", body);
      if (!r.ok) { alert(`저장 실패 (${r.status})\n${JSON.stringify(body)}`); return; }
      alert(`저장 완료 (row ${body.row})\n${Object.keys(body.updated).join(", ")}`);
      lookupCase();
    } catch (e) {
      console.error("[save] error", e);
      alert(`저장 호출 실패: ${e.message}`);
    }
  });

  // ===== 입력 초기화 =====
  document.querySelector(".actions .reset").addEventListener("click", () => {
    document.querySelectorAll("select[data-field]").forEach(s => s.value = "");
  });

  // ===== /case/{연번} 조회 → 화면 채우기 =====
  const API_BASE = "http://127.0.0.1:8765";

  // alias → 실제 시트 헤더명 매핑 (헤더에 줄바꿈/특수문자 포함된 경우 alias 사용)
  const DISPLAY_ALIAS = {
    caseno:      "연번",
    index:       "색인",
    gender:      "성별",
    age:         "연령대",
    name:        "이름",
    ksic:        "한국산업분류표(KSIC)_제10차",
    ksco:        "대상자직업\n(한국직업분류표)(KSCO)_제7차",
    reporttype:  "보고유형",
    reportdate:  "보고일",
    hospital:    "보고병원",
    hospitalid:  "병원등록번호",
    reporter:    "보고인",
    diagcode:    "최종진단코드\nKCD질병분류기호)",
    diagconfirm: "확진여부\n(확진/추정)",
    diagname:    "최종진단명(의증)",
    career:      "직업력 및 병력",
  };

  function fmtVal(v, alias) {
    if (v == null) return "—";
    if (typeof v === "string") {
      if (alias === "reportdate" && v.includes("T")) return v.slice(0, 10);
      return v;
    }
    if (typeof v === "number") {
      return Number.isInteger(v) ? String(v) : String(v);
    }
    return String(v);
  }

  // 직업코드: KSCO 값의 앞쪽 숫자 prefix 추출 (예: "96112_도소매업" → "96112")
  function deriveKscoCode(d) {
    const ksco = d[DISPLAY_ALIAS.ksco] ?? d[DISPLAY_ALIAS.ksic];
    if (typeof ksco !== "string") return "—";
    const m = ksco.match(/^\s*([0-9A-Z]+)/);
    return m ? m[1] : "—";
  }

  async function lookupCase() {
    const no = document.getElementById("caseNo").value.trim();
    if (!no) return;
    let d;
    try {
      const r = await fetch(`${API_BASE}/case/${encodeURIComponent(no)}`);
      if (!r.ok) { alert(`조회 실패 (${r.status}) — 서버 응답 확인`); return; }
      d = await r.json();
    } catch (e) { alert(`서버 호출 실패: ${e.message}`); return; }
    console.log("case", no, d);

    // 1) data-display 표시 셀 채움
    document.querySelectorAll("[data-display]").forEach(el => {
      const alias = el.dataset.display;
      if (alias === "ksco_code") { el.textContent = deriveKscoCode(d); return; }
      const hdr = DISPLAY_ALIAS[alias];
      if (!hdr) return;
      el.textContent = fmtVal(d[hdr], alias);
    });

    // 2) data-field 입력 요소 (textarea/select) 자동 채움
    document.querySelectorAll("[data-field]").forEach(el => {
      if (!el.matches("textarea, select")) return;
      const v = d[el.dataset.field];
      if (v == null) { if (el.tagName === "SELECT") el.value = ""; else el.value = ""; return; }
      el.value = v;
      if (el.tagName === "TEXTAREA") autoGrow(el);
    });

    // 3) 판정 입력: 기존값 영역 갱신
    document.querySelectorAll(".judgment-row").forEach(row => {
      const sel = row.querySelector("select[data-field]");
      const ex = row.querySelector(".existing");
      if (!sel || !ex) return;
      const v = d[sel.dataset.field];
      const s = (v == null ? "" : String(v)).trim();
      if (s) {
        ex.classList.remove("empty");
        ex.innerHTML = '<span class="pill">기존값</span><span class="existing-value"></span>';
        ex.querySelector(".existing-value").textContent = s;
      } else {
        ex.classList.add("empty");
        ex.innerHTML = "기존 입력값 없음";
      }
    });
  }
  document.getElementById("btnLookup").addEventListener("click", lookupCase);
  document.getElementById("caseNo").addEventListener("keydown", e => {
    if (e.key === "Enter") lookupCase();
  });
  // 페이지 로드 시 자동 1회 조회
  lookupCase();

  // ===== 이전 / 다음 =====
  function stepCase(delta) {
    const inp = document.getElementById("caseNo");
    const cur = parseInt(inp.value, 10);
    if (isNaN(cur)) return;
    inp.value = String(cur + delta);
    lookupCase();
  }
  const navBtns = document.querySelectorAll(".toolbar button:not([id])");
  if (navBtns[0]) navBtns[0].addEventListener("click", () => stepCase(-1));
  if (navBtns[1]) navBtns[1].addEventListener("click", () => stepCase(+1));
</script>
</body>
</html>
